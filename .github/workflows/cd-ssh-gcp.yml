name: CD Deploy to GCP VM (SSH)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_PRIVATE_KEY }}
          port: ${{ secrets.GCP_VM_PORT || '22' }}
          script_stop: true
          script: |
            set -eu

            APP_DIR="${{ secrets.GCP_VM_APP_DIR }}"
            REPO_URL="${{ secrets.GCP_REPO_URL }}"
            BRANCH="${{ github.ref_name }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ ! -d "src" ] || [ ! -f "pom.xml" ] || [ ! -f "docker-compose.yml" ]; then
              echo "Invalid APP_DIR: expected repo root containing src/, pom.xml, and docker-compose.yml"
              echo "Current directory: $(pwd)"
              ls -la
              exit 1
            fi

            cat > .env <<EOF
            QUARKUS_DATASOURCE_JDBC_URL=${{ secrets.QUARKUS_DATASOURCE_JDBC_URL }}
            QUARKUS_DATASOURCE_USERNAME=${{ secrets.QUARKUS_DATASOURCE_USERNAME }}
            QUARKUS_DATASOURCE_PASSWORD=${{ secrets.QUARKUS_DATASOURCE_PASSWORD }}
            DISCORD_BOT_TOKEN=${{ secrets.DISCORD_BOT_TOKEN }}
            DISCORD_GUILD_ID=${{ secrets.DISCORD_GUILD_ID }}
            EOF

            docker compose pull || true
            docker compose up -d --build
            docker image prune -f
