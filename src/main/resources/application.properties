quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:postgres}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/discord_marketplace}

quarkus.hibernate-orm.schema-management.strategy=update
quarkus.hibernate-orm.log.sql=false

# Required in production. Keep empty to disable Discord bot startup.
discord.bot.token=${DISCORD_BOT_TOKEN:}

# Optional: set for faster guild-scoped command registration during development.
discord.guild.id=${DISCORD_GUILD_ID:}
